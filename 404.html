<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>InternosMed</title>
    <script>
      // GitHub Pages SPA redirect hack (domínio customizado: internos.med.br)
      // Converte /path/to/page → /?/path/to/page para que index.html capture a rota
      //
      // seg = 0 porque o site está na raiz do domínio customizado (sem subdiretório /repo/)
      // Se fosse usuario.github.io/InternosMedBR/, seg seria 1
      var seg = 0;
      var l = window.location;

      // Guard: evita loop se já estiver no formato /?/
      if (l.search.indexOf('?/') === -1) {
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + seg).join('/') + '/?/' +
          l.pathname.slice(1).split('/').slice(seg).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      }
    </script>
  </head>
  <body></body>
</html>
